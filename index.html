<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Next Chapter</title>
  <style>
    :root {
      --wood-dark: #1c100a;
      --wood-mid: #2e1d13;
      --wood-light: #3d2519;
      --rose-red: #8B2635;
      --rose-dark: #5a1722;
      --beige: #f7ede2;
      --nude: #e8d5c4;
      --black: #0f0a07;
      --vine: #2d4a2b;
      --moss: #4a6b3a;
    }
    * {
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: var(--wood-dark);
      background-image:
        linear-gradient(rgba(28, 16, 10, 0.92), rgba(28, 16, 10, 0.92)),
        url('https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1600&q=80');
      background-attachment: fixed;
      background-size: cover;
      color: var(--beige);
      overflow-x: hidden;
      cursor: default;
    }

    /* Vines + Roses Decor */
.vine-corner {
      position: fixed; pointer-events: none; z-index: 1;
      opacity: 0.7;
    }
.vine-tl { top: 0; left: 0; width: 200px; height: 200px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><path d="M10 10 Q 50 40 30 80 T 80 120 Q 120 100 150 150" stroke="%232d4a2b" stroke-width="3" fill="none"/><circle cx="150" cy="150" r="8" fill="%238B2635"/><circle cx="140" cy="145" r="5" fill="%235a1722"/></svg>') no-repeat;
    }
.vine-br { bottom: 0; right: 0; width: 200px; height: 200px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><path d="M190 190 Q 150 160 170 120 T 120 80 Q 80 100 50 50" stroke="%232d4a2b" stroke-width="3" fill="none"/><circle cx="50" cy="50" r="8" fill="%238B2635"/><circle cx="60" cy="55" r="5" fill="%235a1722"/></svg>') no-repeat;
    }

    /* Glowing Fireflies */
.firefly {
      position: fixed;
      width: 5px; height: 5px;
      background: radial-gradient(circle, #fffacd 0%, #ffeb3b 40%, transparent 70%);
      border-radius: 50%;
      box-shadow:
        0 0 6px #ffeb3b,
        0 0 12px #ffeb3b,
        0 0 20px #ff9800,
        0 0 35px rgba(255, 152, 0, 0.4);
      pointer-events: none;
      z-index: 1;
      animation: drift linear infinite, fireflyPulse ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translateY(0) translateX(0) scale(1); }
      25% { transform: translateY(-25vh) translateX(15px) scale(1.1); }
      50% { transform: translateY(-50vh) translateX(-10px) scale(0.9); }
      75% { transform: translateY(-75vh) translateX(20px) scale(1.05); }
      to { transform: translateY(-105vh) translateX(0px) scale(1); }
    }
    @keyframes fireflyPulse {
      0% { opacity: 0.2; box-shadow: 0 0 4px #ffeb3b, 0 0 8px #ffeb3b, 0 0 12px #ff9800; }
      50% { opacity: 1; box-shadow: 0 0 8px #ffeb3b, 0 0 16px #ffeb3b, 0 0 25px #ff9800, 0 0 40px rgba(255, 152, 0, 0.6); }
      100% { opacity: 0.3; box-shadow: 0 0 5px #ffeb3b, 0 0 10px #ffeb3b, 0 0 15px #ff9800; }
    }

    /* Moss Cursor Trail */
.moss-particle {
      position: fixed;
      width: 8px; height: 8px;
      background: radial-gradient(circle, #4a6b3a 0%, #2d4a2b 60%, transparent 100%);
      border-radius: 50% 40% 60% 30%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transform: translate(-50%, -50%) rotate(0deg);
      animation: mossFade 1.2s ease-out forwards;
      filter: blur(0.3px);
    }
.moss-particle::before {
      content: '';
      position: absolute;
      width: 4px; height: 4px;
      background: #3a5a2a;
      border-radius: 60% 40% 30% 50%;
      top: -2px; left: 3px;
    }
    @keyframes mossFade {
      0% { opacity: 0.8; transform: translate(-50%, -50%) scale(0.3) rotate(0deg); }
      50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1) rotate(180deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(360deg); }
    }
    @media (hover: none) {.moss-particle { display: none; } }

    /* Music Control */
.music-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 10001;
      background: rgba(61, 37, 25, 0.8); border: 1px solid var(--rose-red);
      color: var(--beige); padding: 10px 15px; border-radius: 50px;
      cursor: pointer; backdrop-filter: blur(10px);
      font-family: Georgia, serif;
    }
.music-toggle:hover { background: var(--rose-red); }

    /* Lock Screen */
    #lock-screen {
      position: fixed; inset: 0; background: var(--black);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000;
    }.lock-box {
      background: var(--wood-light); padding: 45px; border-radius: 20px;
      border: 2px solid var(--rose-red); box-shadow: 0 0 40px rgba(139, 38, 53, 0.7);
      text-align: center; max-width: 420px; width: 90%; z-index: 10001;
      position: relative;
    }
.lock-box::before {
      content: '🌹'; position: absolute; top: -15px; left: 50%;
      transform: translateX(-50%); font-size: 2rem;
    }
.lock-box h2 { margin: 10px 0; font-size: 2rem; color: var(--beige); }
.lock-box p { opacity: 0.85; margin: 0 0 25px 0; font-size: 1rem; color: var(--nude); }
.lock-box input {
      width: 100%; padding: 15px; margin: 15px 0;
      border: 1px solid var(--rose-dark); border-radius: 8px; font-size: 1rem;
      background: var(--beige); color: var(--wood-dark);
    }
.lock-box button {
      background: var(--rose-red); color: var(--beige); border: none;
      padding: 15px 30px; border-radius: 8px; font-size: 1.1rem;
      cursor: pointer; width: 100%; letter-spacing: 1px;
    }
.lock-box button:hover { background: var(--rose-dark); transform: translateY(-2px); }
.lock-box button:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg { color: #ffb3b3; margin-top: 12px; height: 20px; font-size: 0.95rem; }
.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

    /* Main Content */
    #main-content {
      display: none; padding: 20px; min-height: 100vh;
      max-width: 900px; margin: 0 auto; position: relative; z-index: 2;
    }
    #main-content h1 {
      font-size: 2.8rem; text-align: center; margin: 30px 0;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.7); color: var(--beige);
    }

    /* Book + Pages */
.book-page {
      background: var(--nude); color: var(--wood-dark);
      padding: 35px; border-radius: 18px; margin: 25px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(139, 38, 53, 0.2);
      display: none; position: relative;
    }
.book-page::before {
      content: ''; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
      border: 1px dashed rgba(139, 38, 53, 0.3); border-radius: 12px; pointer-events: none;
    }
.book-page.active { display: block; animation: fadeIn 0.3s ease; }
.page-number { text-align: center; opacity: 0.5; margin-top: 20px; font-size: 0.9rem; }

.image-placeholder {
      width: 100%; height: 300px; border: 2px dashed var(--rose-red);
      border-radius: 14px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; position: relative;
      background: rgba(139, 38, 53, 0.06); margin: 0 auto 25px auto;
      overflow: hidden;
    }
.image-placeholder:hover { background: rgba(139, 38, 53, 0.12); }
.image-placeholder img { width: 100%; height: 100%; object-fit: cover; }
.image-placeholder span { position: absolute; font-size: 1.2rem; color: var(--rose-red); }

.book-page input,.book-page textarea {
      width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px;
      border: 1px solid rgba(139, 38, 53, 0.3); font-family: Georgia, serif; font-size: 1rem;
      background: var(--beige); color: var(--wood-dark);
    }
.book-page textarea { resize: vertical; min-height: 90px; }

    /* Nav + Controls */
.nav-controls {
      display: flex; justify-content: space-between; align-items: center;
      margin: 30px 0; gap: 15px;
    }
.nav-controls button {
      background: var(--rose-red); color: var(--beige); border: none;
      padding: 14px 25px; border-radius: 10px; cursor: pointer;
      font-family: Georgia, serif; font-size: 1rem;
    }
.nav-controls button:hover { background: var(--rose-dark); transform: translateY(-2px); }
.nav-controls button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.top-controls { text-align: center; margin-bottom: 25px; }
.top-controls button {
      background: rgba(247, 237, 226, 0.15); color: var(--beige);
      border: 1px solid var(--rose-red); padding: 10px 18px;
      border-radius: 8px; cursor: pointer; margin: 5px;
      font-size: 0.95rem; backdrop-filter: blur(8px);
    }
.top-controls button:hover { background: rgba(139, 38, 53, 0.4); }

    footer { text-align: center; padding: 50px 20px; opacity: 0.7; color: var(--nude); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    @media (max-width: 600px) {
      #main-content h1 { font-size: 2.2rem; }
  .book-page { padding: 25px; }
  .image-placeholder { height: 240px; }
  .vine-corner { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>
  <!-- Decorative Elements -->
  <div class="vine-corner vine-tl"></div>
  <div class="vine-corner vine-br"></div>
  <div id="fireflies"></div>

  <!-- Music -->
  <audio id="lofi-music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
  </audio>
  <button class="music-toggle" id="music-toggle" onclick="toggleMusic()">🔇 Music Off</button>  <!-- Lock Screen -->
  <div id="lock-screen">
    <div class="lock-box">
      <h2>Our Next Chapter</h2>
      <p>Hint: It’s a big snake 🐍</p>
      <input type="password" id="secret-answer" placeholder="Enter the secret" />
      <button id="unlock-btn" onclick="checkLock()">Unlock Our Story</button>
      <div class="error-msg" id="lock-error"></div>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <h1>Our Next Chapter</h1>

    <div class="top-controls">
      <button onclick="addPage()">+ Add Memory</button>
      <button onclick="exportData()">Save Backup</button>
      <button onclick="document.getElementById('import-file').click()">Load Backup</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
    </div>

    <div class="book-container" id="book-container"></div>

    <div class="nav-controls">
      <button id="prev-btn" onclick="changePage(-1)">← Previous</button>
      <span id="page-indicator">Page 1 of 1</span>
      <button id="next-btn" onclick="changePage(1)">Next →</button>
    </div>

    <footer><p>Made with ❤️ for our endless adventure</p></footer>
  </div>

  <script>
    // ===== Fireflies =====
    function createFireflies() {
      const container = document.getElementById('fireflies');
      const count = window.innerWidth < 600? 20 : 35;
      for (let i = 0; i < count; i++) {
        const firefly = document.createElement('div');
        firefly.className = 'firefly';
        firefly.style.left = Math.random() * 100 + 'vw';
        firefly.style.top = (Math.random() * 20 + 80) + 'vh';
        const duration = Math.random() * 25 + 20;
        const pulseDuration = Math.random() * 2 + 1.5;
        firefly.style.animationDuration = duration + 's, ' + pulseDuration + 's';
        firefly.style.animationDelay = (Math.random() * 20) + 's, ' + (Math.random() * 3) + 's';
        container.appendChild(firefly);
      }
    }
    createFireflies();

    // ===== Moss Cursor Trail =====
    let mossCanSpawn = true;
    document.addEventListener('mousemove', (e) => {
      if (!mossCanSpawn) return;
      mossCanSpawn = false;

      if (document.getElementById('main-content').style.display!== 'block') {
        setTimeout(() => { mossCanSpawn = true; }, 50);
        return;
      }

      const moss = document.createElement('div');
      moss.className = 'moss-particle';
      moss.style.left = e.clientX + 'px';
      moss.style.top = e.clientY + 'px';
      moss.style.borderRadius = `${40 + Math.random()*20}% ${60 + Math.random()*20}% ${30 + Math.random()*20}% ${50 + Math.random()*20}%`;

      document.body.appendChild(moss);
      setTimeout(() => { moss.remove(); }, 1200);
      setTimeout(() => { mossCanSpawn = true; }, 50);
    });

    // ===== Music =====
    const music = document.getElementById('lofi-music');
    const musicToggle = document.getElementById('music-toggle');
    let musicPlaying = false;

    function toggleMusic() {
      if (musicPlaying) {
        music.pause();
        musicToggle.textContent = '🔇 Music Off';
        musicPlaying = false;
      } else {
        music.play().catch(e => console.log('Autoplay blocked'));
        musicToggle.textContent = '🎵 Music On';
        musicPlaying = true;
      }
    }

    // ===== Password Gate =====
    const CORRECT_ANSWER = "anaconda";
    let attempts = 0;
    let currentPage = 0;
    let pages = JSON.parse(localStorage.getItem('scrapbookPages')) || [createEmptyPage()];

    function checkLock() {
      const answerInput = document.getElementById('secret-answer').value.trim().toLowerCase();
      const errorMsg = document.getElementById('lock-error');
      const unlockBtn = document.getElementById('unlock-btn');

      if (answerInput === CORRECT_ANSWER) {
        document.getElementById('lock-screen').classList.add('hidden');
        music.play().then(() => {
          musicPlaying = true;
          musicToggle.textContent = '🎵 Music On';
        }).catch(() => {
          musicToggle.textContent = '🔇 Click for Music';
        });

        setTimeout(() => {
          document.getElementById('lock-screen').style.display = 'none';
          document.getElementById('main-content').style.display = 'block';
          renderBook();
        }, 800);
      } else {
        attempts++;
        errorMsg.textContent = `Not quite right. ${3 - attempts} tries left 💭`;
        document.getElementById('secret-answer').value = '';
        document.querySelector('.lock-box').style.animation = 'shake 0.5s';
        setTimeout(() => { document.querySelector('.lock-box').style.animation = ''; }, 500);

        if (attempts >= 3) {
          errorMsg.textContent = 'Locked. Refresh the page to try again.';
          unlockBtn.disabled = true;
          document.getElementById('secret-answer').disabled = true;
        }
      }
    }

    document.getElementById('secret-answer').addEventListener('keypress', e => {
      if (e.key === 'Enter') checkLock();
    });

    // ===== Book Logic =====
    function createEmptyPage() {
      return { id: Date.now(), img: '', title: '', date: '', note: '' };
    }

    function renderBook() {
      const container = document.getElementById('book-container');
      container.innerHTML = '';

      pages.forEach((page, index) => {
        const pageEl = document.createElement('div');
        pageEl.className = `book-page ${index === currentPage? 'active' : ''}`;
        pageEl.innerHTML = `
          <div class="image-placeholder" onclick="triggerUpload('file-${page.id}')">
            <span id="text-${page.id}" style="display:${page.img? 'none' : 'block'}">Add Photo 🌹</span>
            <img id="img-${page.id}" alt="Memory" src="${page.img}" style="display:${page.img? 'block' : 'none'}">
          </div>
          <input type="file" id="file-${page.id}" accept="image/*" style="display:none;" onchange="previewImage(this, ${index})">
          <input type="text" placeholder="Memory Title..." value="${page.title}" oninput="updatePage(${index}, 'title', this.value)">
          <input type="date" value="${page.date}" oninput="updatePage(${index}, 'date', this.value)">
          <textarea placeholder="Write about this memory..." oninput="updatePage(${index}, 'note', this.value)">${page.note}</textarea>
          <div class="page-number">Page ${index + 1}</div>
        `;
        container.appendChild(pageEl);
      });

      updateNav();
    }

    function updatePage(index, field, value) {
      pages[index][field] = value;
      savePages();
    }

    function savePages() {
      localStorage.setItem('scrapbookPages', JSON.stringify(pages));
    }    function changePage(dir) {
      currentPage = Math.max(0, Math.min(pages.length - 1, currentPage + dir));
      renderBook();
    }

    function addPage() {
      pages.push(createEmptyPage());
      currentPage = pages.length - 1;
      savePages();
      renderBook();
    }

    function updateNav() {
      document.getElementById('page-indicator').textContent = `Page ${currentPage + 1} of ${pages.length}`;
      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = currentPage === pages.length - 1;
    }

    function triggerUpload(inputId) {
      document.getElementById(inputId).click();
    }

    function previewImage(input, pageIndex) {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          pages[pageIndex].img = e.target.result;
          savePages();
          renderBook();
        };
        reader.readAsDataURL(file);
      }
    }

    // ===== Export / Import =====
    function exportData() {
      const dataStr = JSON.stringify(pages, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'our-next-chapter-backup.json'; a.click();
      URL.revokeObjectURL(url);
    }

    function importData(input) {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          try {
            pages = JSON.parse(e.target.result);
            currentPage = 0;
            savePages();
            renderBook();
            alert('Memories restored successfully! 🌹');
          } catch { alert('Invalid backup file'); }
        };
        reader.readAsText(file);
      }
    }
  </script>
</body>
</html>
